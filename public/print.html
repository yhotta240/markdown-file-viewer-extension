<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Print</title>
    <style>
      body {
        margin: 0;
        color: #24292f;
        background: #ffffff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
        line-height: 1.7;
      }

      .markdown-body {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 24px;
      }

      .markdown-body img {
        max-width: 100%;
        height: auto;
      }

      .markdown-body pre {
        overflow: auto;
        padding: 16px;
        background: #f6f8fa;
        border: 1px solid #d0d7de;
        border-radius: 6px;
      }

      .markdown-body code {
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      }

      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
      }

      .markdown-body th,
      .markdown-body td {
        padding: 6px 13px;
        border: 1px solid #d0d7de;
      }

      .print-error {
        max-width: 680px;
        margin: 48px auto;
        padding: 0 24px;
        color: #b42318;
      }

      @media print {
        .markdown-body {
          max-width: none;
          padding: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="print-root"></div>
    <script src="print.js"></script>
  </body>
</html>
